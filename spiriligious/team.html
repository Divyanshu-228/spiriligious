<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spiriligious · Our Team</title>
    <meta
      name="description"
      content="Spiriligious - ज्ञान, अध्यात्म और विज्ञान का संतुलित मंथन।"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Noto+Sans+Devanagari&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="sacred-glow">
    <div id="infoModal" class="modal">
      <div class="modal-card">
        <i
          class="fas fa-om"
          style="font-size: 2rem; color: #bc6f25; margin-bottom: 0.5rem"
        ></i>
        <h3 id="modalTitle">शीर्षक</h3>
        <p id="modalMessage">विवरण यहाँ दिखेगा...</p>
        <button class="close-modal" onclick="closeModal()">समझ गया 🙏</button>
      </div>
    </div>

    <div id="header-placeholder"></div>

    <main class="container" style="padding: 3rem 0">
      <div
        class="card-glass"
        style="max-width: 800px; margin: 0 auto; padding: 2rem"
      >
        <h1 style="text-align: center">हमारी टीम</h1>

        <!-- Founder -->
        <div style="text-align: center; margin-bottom: 2rem">
          <i
            class="fas fa-user-circle"
            style="font-size: 1.5rem; color: var(--warm-brown)"
          ></i>
          <p style="margin-top: 0.5rem">
            <strong>Lt (Dr.) Hemant Kumar Joshi</strong> – Founder
          </p>
        </div>

        <!-- Full Stack Developer -->
        <div style="text-align: center">
          <i
            class="fas fa-code"
            style="font-size: 1rem; color: var(--link-color)"
          ></i>
          <p style="margin-top: 0.5rem">
            <strong>Dibyanshu sanyal</strong> – Digital Architect
          </p>
        </div>

        <p style="text-align: center; margin-top: 2rem">
          हमारा उद्देश्य परंपराओं के पीछे छिपे विज्ञान और सत्य को समझना और
          प्रस्तुत करना है।
        </p>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="global.js"></script>
    <script src="script.js"></script>
  </body>
</html>
