<!-- FILE: forum.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spiriligious · Forum</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="infoModal" class="modal">...</div>
    <div id="header-placeholder"></div>
    <main class="container" style="padding: 2rem 0">
      <div class="page-header">
        <h1>मंथन मंच</h1>
        <p>प्रश्न पूछें, उत्तर दें, और ज्ञान का सागर मंथन करें।</p>
      </div>
      <div id="forumContainer">
        <div style="text-align: center; margin-bottom: 1.5rem">
          <button
            id="newTopicBtn"
            class="btn btn-primary"
            style="
              background: var(--primary-green);
              color: white;
              border: none;
              padding: 0.6rem 1.2rem;
              border-radius: 2rem;
              cursor: pointer;
            "
          >
            <i class="fas fa-plus"></i> नया विषय
          </button>
        </div>
        <div id="topicsList" class="forum-topics-list"></div>
      </div>
      <div
        id="newTopicModal"
        style="
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.7);
          backdrop-filter: blur(4px);
          align-items: center;
          justify-content: center;
          z-index: 1001;
        "
      >
        <div class="modal-card" style="max-width: 500px; margin: auto">
          <h3>नया विषय बनाएँ</h3>
          <input
            type="text"
            id="topicTitle"
            placeholder="विषय शीर्षक"
            style="
              width: 100%;
              padding: 10px;
              margin: 10px 0;
              border: 1px solid var(--border-light);
              border-radius: 12px;
            "
          />
          <input
            type="text"
            id="topicAuthor"
            placeholder="आपका नाम"
            style="
              width: 100%;
              padding: 10px;
              margin: 10px 0;
              border: 1px solid var(--border-light);
              border-radius: 12px;
            "
          />
          <textarea
            id="topicContent"
            rows="4"
            placeholder="विस्तृत चर्चा..."
            style="
              width: 100%;
              padding: 10px;
              margin: 10px 0;
              border: 1px solid var(--border-light);
              border-radius: 12px;
            "
          ></textarea>
          <div style="display: flex; gap: 1rem; justify-content: center">
            <button
              id="saveTopicBtn"
              class="btn btn-primary"
              style="
                background: var(--primary-green);
                color: white;
                border: none;
                padding: 0.6rem 1.2rem;
                border-radius: 2rem;
                cursor: pointer;
              "
            >
              सबमिट करें
            </button>
            <button
              id="cancelTopicBtn"
              class="btn btn-outline"
              style="
                border: 1px solid var(--primary-green);
                background: none;
                padding: 0.6rem 1.2rem;
                border-radius: 2rem;
                cursor: pointer;
              "
            >
              रद्द करें
            </button>
          </div>
        </div>
      </div>
      <div id="topicDetailView" style="display: none"></div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="global.js"></script>
    <script src="script.js"></script>
  </body>
</html>
