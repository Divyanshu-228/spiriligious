<!-- FILE: contact.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spiriligious · Contact</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="infoModal" class="modal">...</div>
    <div id="header-placeholder"></div>
    <main class="container" style="padding: 3rem 0">
      <div
        class="card-glass"
        style="max-width: 600px; margin: 0 auto; padding: 2rem"
      >
        <h1 style="text-align: center; color: var(--primary-green)">
          Contact Us
        </h1>
        <p style="text-align: center; margin: 1rem 0">
          <i class="fas fa-envelope"></i> <strong>Email:</strong>
          <a
            href="mailto:info@spiriligious.in"
            style="color: var(--primary-green)"
            >info@spiriligious.in</a
          >
        </p>
        <form id="contactForm">
          <input
            type="text"
            id="contactName"
            placeholder="Your Name"
            required
            style="
              width: 100%;
              margin: 0.5rem 0;
              padding: 0.8rem;
              border: 1px solid var(--border-light);
              border-radius: 0.5rem;
            "
          />
          <input
            type="email"
            id="contactEmail"
            placeholder="Email"
            required
            style="
              width: 100%;
              margin: 0.5rem 0;
              padding: 0.8rem;
              border: 1px solid var(--border-light);
              border-radius: 0.5rem;
            "
          />
          <input
            type="text"
            id="contactSubject"
            placeholder="Subject"
            required
            style="
              width: 100%;
              margin: 0.5rem 0;
              padding: 0.8rem;
              border: 1px solid var(--border-light);
              border-radius: 0.5rem;
            "
          />
          <textarea
            id="contactMessage"
            rows="5"
            placeholder="Message"
            required
            style="
              width: 100%;
              margin: 0.5rem 0;
              padding: 0.8rem;
              border: 1px solid var(--border-light);
              border-radius: 0.5rem;
            "
          ></textarea>
          <button
            type="submit"
            class="btn btn-primary"
            style="
              background: var(--primary-green);
              color: white;
              border: none;
              padding: 0.6rem 1.2rem;
              border-radius: 2rem;
              cursor: pointer;
            "
          >
            Send Message
          </button>
        </form>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="global.js"></script>
    <script src="script.js"></script>
    <script>
      initContactForm();
    </script>
  </body>
</html>
