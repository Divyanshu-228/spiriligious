<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiriligious · Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #CDD5DB 0%, #E3E8ED 100%); min-height: 100vh; padding: 2rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.95); border: 1px solid rgba(166,136,104,0.25); border-radius: 2rem; box-shadow: 0 12px 28px -8px rgba(7,23,57,0.1); }
    .login-form { max-width: 420px; margin: 8rem auto; padding: 2.5rem; text-align: center; }
    .login-form h2 { color: #071739; font-size: 1.8rem; margin-bottom: 1.5rem; }
    .login-form input { width: 100%; padding: 0.9rem 1rem; margin: 0.75rem 0; border: 1px solid #A4B5C4; border-radius: 1rem; font-size: 1rem; }
    .login-form input:focus { outline: none; border-color: #A68868; box-shadow: 0 0 0 3px rgba(166,136,104,0.2); }
    .relative { position: relative; }
    .password-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #A68868; }
    .login-form button { width: 100%; margin-top: 1rem; padding: 0.9rem; background: #A68868; color: white; border: none; border-radius: 2rem; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .login-form button:hover { background: #8f6e4c; transform: scale(1.02); }
    .admin-card { background: rgba(255,255,255,0.95); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; }
    h1 { color: #071739; font-size: 2rem; margin-bottom: 2rem; }
    h2 { color: #071739; font-size: 1.4rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    button { background: #A68868; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 2rem; cursor: pointer; margin-right: 0.5rem; transition: 0.2s; }
    button:hover { background: #8f6e4c; transform: translateY(-1px); }
    .item { background: #FEF9F0; border: 1px solid #E3C39D; border-radius: 1rem; padding: 1rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .draft-badge { background: #dc3545; color: white; font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 1rem; margin-left: 0.5rem; }
    .published-badge { background: #28a745; color: white; font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 1rem; margin-left: 0.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .hidden { display: none; }
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(7,23,57,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 2rem; padding: 2rem; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; }
    .modal-content h3 { margin-bottom: 1rem; color: #071739; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 0.6rem; margin: 0.5rem 0; border: 1px solid #A4B5C4; border-radius: 0.8rem; }
    .modal-content label { display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0; }
    .modal-content small { color: #4B6382; }
    .modal-content button { margin-top: 1rem; }
    @media (max-width: 700px) { body { padding: 1rem; } .login-form { margin: 4rem auto; padding: 1.5rem; } }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
</head>
<body>

<div id="loginContainer" class="container">
  <div class="card login-form">
    <h2>Admin Login</h2>
    <input type="email" id="adminEmail" placeholder="Email">
    <div class="relative">
      <input type="password" id="adminPassword" placeholder="Password">
      <i class="fas fa-eye-slash password-toggle" id="togglePassword"></i>
    </div>
    <button id="loginBtn">Login</button>
  </div>
</div>

<div id="adminPanel" class="hidden container">
  <h1>Spiriligious CMS</h1>

  <div class="admin-card">
    <h2><i class="fas fa-microscope"></i> Scientific Cards</h2>
    <button onclick="openCardForm()">+ Add New Card</button>
    <div id="cardsList" class="grid"></div>
  </div>

  <div class="admin-card">
    <h2><i class="fas fa-music"></i> Bhajan Videos</h2>
    <button onclick="openVideoForm()">+ Add New Video</button>
    <div id="videosList" class="grid"></div>
  </div>

  <div class="admin-card">
    <h2><i class="fas fa-book"></i> Encyclopedia Terms</h2>
    <button onclick="openTermForm()">+ Add New Term</button>
    <div id="termsList" class="grid"></div>
  </div>

  <div class="admin-card">
  <h2>
    <i class="fas fa-comments"></i>
    Forum Topics
  </h2>
  <div id="forumTopicsList" class="grid"></div>
</div>

</div>

<script>
  // ==================== FIREBASE CONFIG ====================
  const firebaseConfig = {
    apiKey: "AIzaSyC8h_NLwFq54mFSrZhG-gQnWJRIAr0zc5c",
    authDomain: "spiriligious-cms.firebaseapp.com",
    projectId: "spiriligious-cms",
    storageBucket: "spiriligious-cms.firebasestorage.app",
    messagingSenderId: "595657008516",
    appId: "1:595657008516:web:e7d2fed4b5e1e5c481e9d1",
    measurementId: "G-LXB9R61S94"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  // ==================== HELPER: YouTube URL to Embed ====================
  // Optional: restrict to a specific channel ID (set to null to disable)
  const ALLOWED_CHANNEL_ID = null; // e.g., "UCxxxxxxxxxxxxxxxxxxxxxx"

  function extractYouTubeData(url) {

  // Playlist
  const playlistMatch = url.match(/[?&]list=([^&]+)/);

  if (playlistMatch) {
    return {
      type: 'playlist',
      id: playlistMatch[1]
    };
  }

  // Videos / Shorts
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?#]+)/,
    /youtube\.com\/shorts\/([^&?#]+)/
  ];

  for (let pattern of patterns) {
    const match = url.match(pattern);

    if (match && match[1]) {
      return {
        type: 'video',
        id: match[1]
      };
    }
  }

  return null;
}

  async function convertToEmbedUrl(inputUrl) {
  const data = extractYouTubeData(inputUrl);
  if (!data) return null;
  if (data.type === 'playlist') {
    return `https://www.youtube.com/embed/videoseries?list=${data.id}`;
  }
  return `https://www.youtube.com/embed/${data.id}`;
}

  // Validate that the URL is a valid YouTube link (any form) and return embed URL
  async function validateAndConvertYouTubeLink(inputUrl, fieldElement) {
    if (!inputUrl.trim()) {
      fieldElement.style.borderColor = "#A4B5C4";
      return null;
    }
    const embed = await convertToEmbedUrl(inputUrl);
    if (!embed) {
      fieldElement.style.borderColor = "#dc3545";
      alert("Invalid YouTube URL. Please enter a valid YouTube link (e.g., https://www.youtube.com/watch?v=... or https://youtu.be/...)");
      return null;
    }
    fieldElement.style.borderColor = "#28a745";
    return embed;
  }

  // ==================== AUTH & UI ====================
  const toggle = document.getElementById('togglePassword');
  const pwd = document.getElementById('adminPassword');
  if (toggle && pwd) {
    toggle.addEventListener('click', () => {
      const type = pwd.type === 'password' ? 'text' : 'password';
      pwd.type = type;
      toggle.classList.toggle('fa-eye');
      toggle.classList.toggle('fa-eye-slash');
    });
  }

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('adminEmail').value;
    const password = document.getElementById('adminPassword').value;
    try {
      await auth.signInWithEmailAndPassword(email, password);
      document.getElementById('loginContainer').classList.add('hidden');
      document.getElementById('adminPanel').classList.remove('hidden');
      loadAllData();
    } catch (err) {
      alert("Login failed: " + err.message);
    }
  };

  async function loadAllData() { await loadCards(); await loadVideos(); await loadTerms(); }

  async function loadCards() {
    const snap = await db.collection('scientificCards').orderBy('order').get();
    const container = document.getElementById('cardsList');
    container.innerHTML = '';
    snap.forEach(doc => {
      const data = doc.data();
      const isPublished = data.published === true;
      const badge = isPublished ? '<span class="published-badge">Published</span>' : '<span class="draft-badge">Draft</span>';
      container.innerHTML += `
        <div class="item">
          <div><strong>${escapeHtml(data.title)}</strong> ${badge}<br><small>${escapeHtml(data.category)}</small></div>
          <div>
            <button onclick="togglePublishCard('${doc.id}', ${!isPublished})">${isPublished ? 'Unpublish' : 'Publish'}</button>
            <button onclick="editCard('${doc.id}')">Edit</button>
            <button onclick="deleteCard('${doc.id}')">Delete</button>
          </div>
        </div>
      `;
    });
  }

  async function loadVideos() {
    const snap = await db.collection('bhajanVideos').orderBy('order').get();
    const container = document.getElementById('videosList');
    container.innerHTML = '';
    snap.forEach(doc => {
      const data = doc.data();
      const isPublished = data.published === true;
      const badge = isPublished ? '<span class="published-badge">Published</span>' : '<span class="draft-badge">Draft</span>';
      container.innerHTML += `
        <div class="item">
          <div><strong>${escapeHtml(data.title)}</strong> ${badge}<br><small>${escapeHtml(data.videoUrl)}</small></div>
          <div>
            <button onclick="togglePublishVideo('${doc.id}', ${!isPublished})">${isPublished ? 'Unpublish' : 'Publish'}</button>
            <button onclick="editVideo('${doc.id}')">Edit</button>
            <button onclick="deleteVideo('${doc.id}')">Delete</button>
          </div>
        </div>
      `;
    });
  }

  async function loadTerms() {
    const snap = await db.collection('encyclopediaTerms').get();
    const container = document.getElementById('termsList');
    container.innerHTML = '';
    snap.forEach(doc => {
      const data = doc.data();
      const isPublished = data.published === true;
      const badge = isPublished ? '<span class="published-badge">Published</span>' : '<span class="draft-badge">Draft</span>';
      container.innerHTML += `
        <div class="item">
          <div><strong>${escapeHtml(data.term)}</strong> ${badge}<br><small>${escapeHtml(data.meaning.substring(0,50))}...</small></div>
          <div>
            <button onclick="togglePublishTerm('${doc.id}', ${!isPublished})">${isPublished ? 'Unpublish' : 'Publish'}</button>
            <button onclick="editTerm('${doc.id}')">Edit</button>
            <button onclick="deleteTerm('${doc.id}')">Delete</button>
          </div>
        </div>
      `;
    });
  }

  window.togglePublishCard = async (id, newStatus) => { await db.collection('scientificCards').doc(id).update({ published: newStatus }); loadCards(); };
  window.togglePublishVideo = async (id, newStatus) => { await db.collection('bhajanVideos').doc(id).update({ published: newStatus }); loadVideos(); };
  window.togglePublishTerm = async (id, newStatus) => { await db.collection('encyclopediaTerms').doc(id).update({ published: newStatus }); loadTerms(); };
  window.deleteCard = async (id) => { if(confirm('Delete?')) await db.collection('scientificCards').doc(id).delete(); loadCards(); };
  window.deleteVideo = async (id) => { if(confirm('Delete?')) await db.collection('bhajanVideos').doc(id).delete(); loadVideos(); };
  window.deleteTerm = async (id) => { if(confirm('Delete?')) await db.collection('encyclopediaTerms').doc(id).delete(); loadTerms(); };

  // ==================== FORMS WITH YOUTUBE CONVERTER ====================
  function openCardForm(editId = null) { openModalForm('card', editId); }
  function openVideoForm(editId = null) { openModalForm('video', editId); }
  function openTermForm(editId = null) { openModalForm('term', editId); }

  function openModalForm(type, editId = null) {
    let html = '';
    if (type === 'card') {
      html = `<h3>${editId ? 'Edit' : 'Add'} Scientific Card</h3>
        <input type="text" id="cardTitle" placeholder="Title"><br>
        <input type="text" id="cardCategory" placeholder="Category"><br>
        <textarea id="cardShortDesc" placeholder="Short Description" rows="2"></textarea><br>
        <textarea id="cardFullAnalysis" placeholder="Full Analysis (HTML allowed)" rows="4"></textarea><br>
        <input type="number" id="cardOrder" placeholder="Order (0,1,2...)"><br>
        <label><input type="checkbox" id="cardPublished" checked> Publish immediately</label><br>
        <button onclick="saveCard('${editId || ''}')">Save</button>
        <button onclick="closeModal()">Cancel</button>`;
    } else if (type === 'video') {
      html = `<h3>${editId ? 'Edit' : 'Add'} Bhajan Video</h3>
        <input type="text" id="videoTitle" placeholder="Title"><br>
        <input type="text" id="videoUrlInput" placeholder="YouTube link (any format)" style="width:100%;"><br>
        <small>Paste any YouTube link (watch, youtu.be, embed, share). It will be converted automatically.</small><br>
        <input type="number" id="videoOrder" placeholder="Order (0,1,2...)"><br>
        <label><input type="checkbox" id="videoPublished" checked> Publish immediately</label><br>
        <button onclick="saveVideo('${editId || ''}')">Save</button>
        <button onclick="closeModal()">Cancel</button>`;
    } else if (type === 'term') {
      html = `<h3>${editId ? 'Edit' : 'Add'} Encyclopedia Term</h3>
        <input type="text" id="termName" placeholder="Term (e.g., ॐ)"><br>
        <textarea id="termMeaning" placeholder="Traditional meaning" rows="2"></textarea><br>
        <textarea id="termScientific" placeholder="Scientific explanation" rows="3"></textarea><br>
        <label><input type="checkbox" id="termPublished" checked> Publish immediately</label><br>
        <button onclick="saveTerm('${editId || ''}')">Save</button>
        <button onclick="closeModal()">Cancel</button>`;
    }
    const modalDiv = document.createElement('div');
    modalDiv.className = 'modal-overlay';
    modalDiv.id = 'dynamicModal';
    modalDiv.innerHTML = `<div class="modal-content">${html}</div>`;
    document.body.appendChild(modalDiv);
    if (editId) loadExistingData(type, editId);
  }

  async function loadExistingData(type, id) {
    let doc;
    if (type === 'card') doc = await db.collection('scientificCards').doc(id).get();
    else if (type === 'video') doc = await db.collection('bhajanVideos').doc(id).get();
    else doc = await db.collection('encyclopediaTerms').doc(id).get();
    const data = doc.data();
    if (type === 'card') {
      document.getElementById('cardTitle').value = data.title || '';
      document.getElementById('cardCategory').value = data.category || '';
      document.getElementById('cardShortDesc').value = data.shortDesc || '';
      document.getElementById('cardFullAnalysis').value = data.fullAnalysis || '';
      document.getElementById('cardOrder').value = data.order || 0;
      document.getElementById('cardPublished').checked = data.published === true;
    } else if (type === 'video') {
      document.getElementById('videoTitle').value = data.title || '';
      document.getElementById('videoUrlInput').value = data.videoUrl || ''; // show stored embed URL or original link (optional)
      document.getElementById('videoOrder').value = data.order || 0;
      document.getElementById('videoPublished').checked = data.published === true;
    } else if (type === 'term') {
      document.getElementById('termName').value = data.term || '';
      document.getElementById('termMeaning').value = data.meaning || '';
      document.getElementById('termScientific').value = data.scientific || '';
      document.getElementById('termPublished').checked = data.published === true;
    }
  }

  window.saveCard = async (id) => {
    const data = {
      title: document.getElementById('cardTitle').value,
      category: document.getElementById('cardCategory').value,
      shortDesc: document.getElementById('cardShortDesc').value,
      fullAnalysis: document.getElementById('cardFullAnalysis').value,
      order: parseInt(document.getElementById('cardOrder').value) || 0,
      published: document.getElementById('cardPublished').checked
    };
    if (id) await db.collection('scientificCards').doc(id).update(data);
    else await db.collection('scientificCards').add(data);
    closeModal(); loadCards();
  };
  window.saveVideo = async (id) => {
  const urlInput =
    document.getElementById('videoUrlInput').value.trim();
  if (!urlInput) {
    alert("Please enter a YouTube link.");
    return;
  }
  const embedUrl =
    await validateAndConvertYouTubeLink(
      urlInput,
      document.getElementById('videoUrlInput')
    );
  if (!embedUrl) return;
  const data = {
    title: document.getElementById('videoTitle').value,
    videoUrl: embedUrl,
    order: parseInt(document.getElementById('videoOrder').value) || 0,
    published: document.getElementById('videoPublished').checked
  };
  try {
    if (id) {
      await db.collection('bhajanVideos').doc(id).update(data);
    } else {
      await db.collection('bhajanVideos').add(data);
    }
    closeModal();
    // FULL REFRESH
    setTimeout(async () => {
      await loadVideos();
    }, 300);
  } catch(err) {
    console.error(err);
    alert("Failed to save video.");
  }
};

  window.saveTerm = async (id) => {
    const data = {
      term: document.getElementById('termName').value,
      meaning: document.getElementById('termMeaning').value,
      scientific: document.getElementById('termScientific').value,
      published: document.getElementById('termPublished').checked
    };
    if (id) await db.collection('encyclopediaTerms').doc(id).update(data);
    else await db.collection('encyclopediaTerms').add(data);
    closeModal(); loadTerms();
  };

  window.editCard = (id) => openCardForm(id);
  window.editVideo = (id) => openVideoForm(id);
  window.editTerm = (id) => openTermForm(id);
  function closeModal() { const modalDiv = document.getElementById('dynamicModal'); if (modalDiv) modalDiv.remove(); }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  async function loadForumTopics() {
  const snapshot = await db
    .collection('forumTopics')
    .orderBy('createdAt', 'desc')
    .get();
  const container = document.getElementById('forumTopicsList');
  if (snapshot.empty) {
    container.innerHTML = `
      <p>No forum topics found.</p>
    `;
    return;
  }
  container.innerHTML = '';
  snapshot.forEach(doc => {
    const topic = doc.data();
    container.innerHTML += `
      <div class="item">
        <div>
          <strong>${escapeHtml(topic.title)}</strong>
          <br>
          <small>
            by ${escapeHtml(topic.author || "Anonymous")}
          </small>
          ${
            topic.published
              ? '<span class="published-badge">Published</span>'
              : '<span class="draft-badge">Pending</span>'
          }
        </div>
        <div>
          <button onclick="approveTopic('${doc.id}')">
            Approve
          </button>
          <button onclick="deleteTopic('${doc.id}')">
            Delete
          </button>
        </div>
      </div>
    `;
  });
}
async function approveTopic(id) {
  await db.collection('forumTopics')
    .doc(id)
    .update({
      published: true
    });
  loadForumTopics();
}
async function deleteTopic(id) {
  await db.collection('forumTopics')
    .doc(id)
    .update({
      deleted: true
    });
  loadForumTopics();
}
.where('deleted', '==', false)
.where('published', '==', true)
</script>
</body>
</html>
