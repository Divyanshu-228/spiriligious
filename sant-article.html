<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spiriligious · लेख</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="infoModal" class="modal">...</div>
    <div id="header-placeholder"></div>
    <main class="container" style="padding: 2rem 0">
      <div id="articleContent" style="max-width: 800px; margin: 0 auto"></div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="global.js"></script>
    <script>
      async function loadArticle() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get("id");
        if (!id) {
          document.getElementById("articleContent").innerHTML =
            "<p>लेख नहीं मिला।</p>";
          return;
        }
        const doc = await db.collection("santArticles").doc(id).get();
        if (!doc.exists) {
          document.getElementById("articleContent").innerHTML =
            "<p>लेख नहीं मिला।</p>";
          return;
        }
        const a = doc.data();
        document.getElementById("articleContent").innerHTML = `
        <div class="card-glass" style="padding: 2rem;">
          <h1 style="color: var(--primary-green);">${escapeHtml(a.title)}</h1>
          <p style="color: var(--text-soft); margin-bottom: 1rem;"><strong>✍️ ${escapeHtml(a.author)}</strong><br>${escapeHtml(a.authorCredits || "")}</p>
          ${a.imageUrl ? `<img src="${a.imageUrl}" style="width:100%; border-radius:1rem; margin:1rem 0;">` : ""}
          <div style="line-height:1.8;">${a.content}</div>
        </div>
      `;
      }
      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }
      document.addEventListener("DOMContentLoaded", () => {
        loadArticle();
      });
    </script>
  </body>
</html>
